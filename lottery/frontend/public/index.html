<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LotteryTogether - 抽奖软件</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/themes.css">
</head>
<body class="light-theme">
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <h1>🎰 LotteryTogether</h1>
        </div>
        <div class="nav-links">
            <a href="#home" class="nav-link active" data-page="home">首页</a>
            <a href="#profile" class="nav-link" data-page="profile">我的</a>
            <button id="theme-toggle" class="theme-toggle-btn">🌙</button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main id="app">
        <!-- 首页 -->
        <section id="home-page" class="page active">
            <!-- 公告区域 -->
            <div id="announcements-container"></div>
            
            <!-- 维护模式提示 -->
            <div id="maintenance-banner" class="maintenance-banner" style="display: none;">
                <h2>🔧 系统维护中</h2>
                <p id="maintenance-message">系统正在维护，请稍后再试。</p>
            </div>
            
            <!-- 口令输入区 -->
            <div class="access-code-section">
                <h2>进入抽奖</h2>
                <div class="access-code-form">
                    <input type="text" id="access-code-input" placeholder="输入抽奖口令">
                    <button id="enter-lottery-btn" class="btn btn-primary">进入</button>
                </div>
            </div>
            
            <!-- 公开抽奖列表 -->
            <div class="public-lotteries-section">
                <h2>公开抽奖</h2>
                <div id="public-lotteries-list" class="lotteries-grid"></div>
            </div>
        </section>

        <!-- 登录/注册页 -->
        <section id="auth-page" class="page">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-auth="login">登录</button>
                    <button class="auth-tab" data-auth="register">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form id="login-form" class="auth-form active">
                    <h2>用户登录</h2>
                    <div class="form-group">
                        <label for="login-username">用户名</label>
                        <input type="text" id="login-username" required minlength="3" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </form>
                
                <!-- 注册表单 -->
                <form id="register-form" class="auth-form">
                    <h2>用户注册</h2>
                    <div class="form-group">
                        <label for="register-username">用户名</label>
                        <input type="text" id="register-username" required minlength="3" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="register-password">密码</label>
                        <input type="password" id="register-password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </form>
            </div>
        </section>

        <!-- 个人中心页 -->
        <section id="profile-page" class="page">
            <div class="profile-container">
                <div class="profile-header">
                    <h2 id="profile-username">用户名</h2>
                    <span id="profile-badge" class="badge"></span>
                </div>
                
                <div class="profile-actions">
                    <button id="view-participated-btn" class="btn btn-secondary">查看参与过的抽奖</button>
                    <button id="create-lottery-btn" class="btn btn-primary">创建抽奖</button>
                    <button id="admin-panel-btn" class="btn btn-warning" style="display: none;">管理后台</button>
                    <button id="logout-btn" class="btn btn-danger">退出登录</button>
                </div>
                
                <div class="profile-settings">
                    <h3>账户设置</h3>
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="profile-new-username">新用户名</label>
                            <input type="text" id="profile-new-username" minlength="3" maxlength="20">
                        </div>
                        <div class="form-group">
                            <label for="profile-new-password">新密码</label>
                            <input type="password" id="profile-new-password" minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary">保存更改</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- 创建抽奖页 -->
        <section id="create-lottery-page" class="page">
            <div class="lottery-form-container">
                <h2>创建抽奖</h2>
                <form id="create-lottery-form">
                    <div class="form-group">
                        <label for="lottery-name">抽奖名称</label>
                        <input type="text" id="lottery-name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lottery-description">描述</label>
                        <textarea id="lottery-description" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="lottery-mode">抽奖模式</label>
                        <select id="lottery-mode">
                            <option value="normal">普通模式</option>
                            <option value="special">特殊转盘模式</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="lottery-redemption">兑奖说明</label>
                        <textarea id="lottery-redemption" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>奖品列表（一行一个）</label>
                        <textarea id="prizes-input" rows="5" placeholder="奖品 1&#10;奖品 2&#10;奖品 3"></textarea>
                        <small>批量添加：每行一个奖品名称</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="lottery-access-code">进入口令</label>
                        <div class="input-group">
                            <input type="text" id="lottery-access-code" placeholder="留空则公开">
                            <button type="button" id="generate-code-btn" class="btn btn-secondary">随机生成</button>
                        </div>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="lottery-is-public">
                            设为公开（在首页显示）
                        </label>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="lottery-require-login">
                            强制登录参与
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="lottery-max-participants">最大参与人数</label>
                        <input type="number" id="lottery-max-participants" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="lottery-draw-time">开奖时间</label>
                        <input type="datetime-local" id="lottery-draw-time">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">创建抽奖</button>
                        <button type="button" id="cancel-create-btn" class="btn btn-secondary">取消</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- 抽奖详情页 -->
        <section id="lottery-detail-page" class="page">
            <div class="lottery-detail-container">
                <button id="back-to-home-btn" class="btn btn-secondary">← 返回首页</button>
                
                <div class="lottery-info">
                    <h2 id="detail-lottery-name"></h2>
                    <p id="detail-lottery-description"></p>
                    <div class="lottery-meta">
                        <span id="detail-lottery-mode"></span>
                        <span id="detail-participant-count"></span>
                        <span id="detail-draw-time"></span>
                    </div>
                </div>
                
                <!-- 转盘区域 -->
                <div class="spinner-container">
                    <canvas id="wheel-canvas" width="400" height="400"></canvas>
                    <button id="spin-btn" class="btn btn-primary spin-btn">开始抽奖</button>
                </div>
                
                <!-- 奖品列表 -->
                <div class="prizes-list">
                    <h3>奖品列表</h3>
                    <ul id="detail-prizes-list"></ul>
                </div>
                
                <!-- 兑奖说明 -->
                <div class="redemption-info">
                    <h3>兑奖说明</h3>
                    <p id="detail-redemption"></p>
                </div>
                
                <!-- 倒计时 -->
                <div id="countdown-container" class="countdown-container" style="display: none;">
                    <h3>开奖倒计时</h3>
                    <div id="countdown-timer" class="countdown-timer">00:00:00</div>
                </div>
                
                <!-- 结果展示 -->
                <div id="result-container" class="result-container" style="display: none;">
                    <h3>🎉 开奖结果 🎉</h3>
                    <div id="result-content"></div>
                </div>
            </div>
        </section>

        <!-- 管理员后台 -->
        <section id="admin-page" class="page">
            <div class="admin-container">
                <h2>管理后台</h2>
                
                <div class="admin-tabs">
                    <button class="admin-tab active" data-admin-tab="users">用户管理</button>
                    <button class="admin-tab" data-admin-tab="announcements">公告管理</button>
                    <button class="admin-tab" data-admin-tab="settings">系统设置</button>
                </div>
                
                <!-- 用户管理 -->
                <div id="admin-users-tab" class="admin-tab-content active">
                    <h3>用户列表</h3>
                    <div id="users-table-container">
                        <table id="users-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>角色</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body"></tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 公告管理 -->
                <div id="admin-announcements-tab" class="admin-tab-content">
                    <h3>创建公告</h3>
                    <form id="announcement-form">
                        <div class="form-group">
                            <label for="announcement-title">标题</label>
                            <input type="text" id="announcement-title" required>
                        </div>
                        <div class="form-group">
                            <label for="announcement-content">内容（支持 Markdown）</label>
                            <textarea id="announcement-content" rows="10" required></textarea>
                        </div>
                        <div class="form-group checkbox-group">
                            <label>
                                <input type="checkbox" id="announcement-markdown" checked>
                                使用 Markdown 格式
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary">发布公吿</button>
                    </form>
                </div>
                
                <!-- 系统设置 -->
                <div id="admin-settings-tab" class="admin-tab-content">
                    <h3>系统设置</h3>
                    <form id="settings-form">
                        <div class="form-group">
                            <label for="setting-rate-limit-enabled">启用速率限制</label>
                            <select id="setting-rate-limit-enabled">
                                <option value="true">开启</option>
                                <option value="false">关闭</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="setting-rate-limit-hour">每小时访问次数限制</label>
                            <input type="number" id="setting-rate-limit-hour" value="100">
                        </div>
                        <div class="form-group">
                            <label for="setting-rate-limit-minute">每分钟访问次数限制</label>
                            <input type="number" id="setting-rate-limit-minute" value="20">
                        </div>
                        <div class="form-group">
                            <label for="setting-maintenance-mode">维护模式</label>
                            <select id="setting-maintenance-mode">
                                <option value="false">关闭</option>
                                <option value="true">开启</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="setting-maintenance-message">维护消息</label>
                            <textarea id="setting-maintenance-message" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">保存设置</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2024 LotteryTogether. All rights reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="utils/config.js"></script>
    <script src="utils/api.js"></script>
    <script src="utils/auth.js"></script>
    <script src="utils/wheel.js"></script>
    <script src="app.js"></script>
</body>
</html>
